                    <div class="container__section-button" style="--btn-width: 35px;"></div>
                </div>
                <div class="container__section-block">
                    <div class="container__section-icon"></div>
                    <div class="container__section-button" style="--btn-width: 67px;"></div>
                </div>
                <div class="container__section-block">
                    <div class="container__section-icon"></div>
